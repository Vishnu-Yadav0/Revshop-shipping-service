spring.application.name=shipping-service
server.port=8086
spring.profiles.active=local

# Config Server Import
spring.config.import=optional:configserver:http://localhost:8888

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/revshop_shipping?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Security - permit all for now to avoid issues
spring.security.user.name=admin
spring.security.user.password=admin

# Zipkin / Distributed Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Config Client Timeout (Avoid Hangups)
spring.cloud.config.request-connect-timeout=5000
spring.cloud.config.request-read-timeout=5000
